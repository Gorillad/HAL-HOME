<!-- IBC Master — Section Four: CTA band + Quick Order -->
<!-- Include: /data/css/section-four.css -->
<!-- Place after About Us (section-two), before footer -->

<section class="section-four" aria-label="Contact and quick order">

  <div class="cta-band">
    <div class="cta-band__inner">
      <div class="cta-band__content">
        <p class="cta-band__eyebrow">Talk to our team</p>
        <h2 class="cta-band__title">Need help sourcing the right product?</h2>
        <p class="cta-band__text">Our team is ready to assist with quotes, bulk orders, and hard-to-find parts for your operation.</p>
      </div>
      <div class="cta-band__actions">
        <a class="cta-band__btn cta-band__btn--primary" href="/contact">Request a Quote</a>
        <a class="cta-band__btn cta-band__btn--secondary" href="/sign-up">Open an Account</a>
        <a class="cta-band__btn cta-band__btn--phone" href="tel:18005551234">1-800-555-1234</a>
      </div>
    </div>
  </div>

  <div class="quick-order">
    <div class="quick-order__inner">
      <div class="quick-order__header">
        <h2 class="quick-order__title">Quick Order</h2>
        <p class="quick-order__subtitle">Know your part number? Enter it below to search and order fast.</p>
      </div>
      <form class="quick-order__form" action="/industrial-supplies" method="get" role="search">
        <div class="quick-order__field">
          <label for="quick-order-part">Part / SKU / Model #</label>
          <input type="text" id="quick-order-part" name="q" placeholder="e.g. 123-ABC-456" autocomplete="off">
        </div>
        <div class="quick-order__field quick-order__field--qty">
          <label for="quick-order-qty">Qty</label>
          <input type="number" id="quick-order-qty" name="qty" value="1" min="1" max="9999">
        </div>
        <button type="submit" class="quick-order__submit">Search &amp; Order</button>
      </form>
    </div>
  </div>

</section>
